name: AI Scout Daily Automation

on:
  schedule:
    # 毎日日本時間 15:15 (UTC 06:15) に実行
    # cronの指定はUTC（協定世界時）ベースのため、9時間引いた時間を指定します
    - cron: '15 6 * * 1-5'
  workflow_dispatch: # 必要に応じて手動トリガーでも起動できるようにする

env:
  CARGO_TERM_COLOR: always
  # 必要に応じてGCSやDiscordの環境変数をここに定義（GitHub Secretsから注入）
  # DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  # GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCS_SA_KEY }}

jobs:
  scout_and_analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Rust 開発環境のセットアップとキャッシュによる高速化
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: swatinem/rust-cache@v2

    # 2. CI環境（Ubuntu）に Ollama をインストールしてバックグラウンド起動
    - name: Install and Start Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        # バックグラウンドでサーバーを起動し、起動を少し待つ
        ollama serve &
        sleep 5
        # 必要なモデル（Gemma 3）をローカル環境にプル
        ollama pull gemma3:latest

    # 3. LLM コマンドラインツール（llm）とプラグインのセットアップ
    - name: Install LLM CLI & Plugins
      run: |
        pipx install llm
        llm install llm-ollama
        # クラウド版Geminiを併用する場合はここでプラグイン追加とキー設定を行う
        # llm install llm-gemini
        # llm keys set gemini "${{ secrets.GEMINI_API_KEY }}"

        # 1. GitHubのリポジトリから最新コードを取得（既存ステップ）
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔑 2. Google Cloud の認証を通す（追加するステップ）
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets::GCP_SA_KEY }}

      # 🛠 3. gcloud/gsutil のセットアップ（追加するステップ）
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 📥 4. GCSバケットから最新データをCI環境に引き抜く（追加するステップ）
      - name: Download latest data from GCS
        run: |
          mkdir -p data logs
          # あなたのGCSバケット名（例: my-stock-bucket）に書き換えてください
          gsutil cp gs://GCP_SA_KEY/processed_market_data.parquet data/ || echo "Parquet not found in GCS, using fallback."
          gsutil cp gs://GCP_SA_KEY/stocks.db ./ || echo "SQLite DB not found in GCS, creating new."

    # 4. パイプラインの実行（ビルド＆リリース実行）
    - name: Run AI Scout Pipeline
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        # 本番運用のため --release フラグで最適化ビルドして実行
        cargo run --release --bin ai_scout

    # 5. 生成された成果物（CSVやログ）の永続化（GCS移行前の一時措置）
    - name: Upload execution artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ai-scout-results-${{ github.job }}
        path: |
          *.csv
          *.txt
        retention-days: 7

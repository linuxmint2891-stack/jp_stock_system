name: AI Scout Daily Automation

on:
  schedule:
    # 毎日日本時間 15:15 (UTC 06:15) に実行
    - cron: '15 6 * * 1-5'
  workflow_dispatch: # 手動トリガー

env:
  CARGO_TERM_COLOR: always

jobs:
  scout_and_analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Rust 開発環境のセットアップとキャッシュによる高速化
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      
    # 2. CI環境（Ubuntu）に Ollama をインストールしてバックグラウンド起動
    - name: Install and Start Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        # バックグラウンドでサーバーを起動し、起動を少し待つ
        ollama serve &
        sleep 5
        # 必要なモデル（Gemma 3）をローカル環境にプル
        ollama pull gemma3:latest

    # 3. LLM コマンドラインツール（llm）とプラグインのセットアップ
    - name: Install LLM CLI & Plugins
      run: |
        pipx install llm
        llm install llm-ollama
        
    # 🔑 4. Google Cloud の認証を通す
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # 🛠 5. gcloud/gsutil のセットアップ
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # 7. パイプラインの実行（データ同期 & AI分析）
    - name: Run AI Scout Pipeline
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        # 🔑 Googleドライブ接続用のシークレット
        GDRIVE_SECRET_JSON: ${{ secrets.M_DRIVE_SECRET }}
        GDRIVE_TOKEN_CACHE: ${{ secrets.GDRIVE_TOKEN_CACHE }}
      run: |
        mkdir -p data
        mkdir -p logs
        
        # ① Googleドライブから最新の Parquet 台帳をダウンロード
        echo "📥 Downloading baseline data from Google Drive..."
        cargo run --release --bin download_drive
        
        # ② 最新価格の超軽量同期 (デイリーモード)
        echo "🚀 Syncing latest market data..."
        cargo run --release --bin sync_yahoo
        
        # ③ AI分析実行
        echo "🧠 Running AI Scout analysis..."
        cargo run --release --bin ai_scout

    # 📤 8. 最新データをGoogle ドライブに保存・同期
    - name: Upload updated data back to Google Drive
      if: success()
      env:
        GDRIVE_SECRET_JSON: ${{ secrets.M_DRIVE_SECRET }}
        GDRIVE_TOKEN_CACHE: ${{ secrets.GDRIVE_TOKEN_CACHE }}
      run: |
        if [ -z "$GDRIVE_SECRET_JSON" ]; then
          echo "⚠️ M_DRIVE_SECRET is not set. Skipping upload."
          exit 0
        fi
        
        # マイドライブへ最新のParquetファイルをアップロード（上書き）
        cargo run --release --bin upload_drive

    # 9. 生成された成果物（CSVやログ）の永続化
    - name: Upload execution artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ai-scout-results-${{ github.job }}
        path: |
          *.csv
          *.txt
        retention-days: 7

name: AI Scout Daily Automation

on:
  schedule:
    # 毎日日本時間 15:15 (UTC 06:15) に実行
    - cron: '15 6 * * 1-5'
  workflow_dispatch: # 手動トリガー

env:
  CARGO_TERM_COLOR: always

jobs:
  scout_and_analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Rust 開発環境のセットアップとキャッシュによる高速化
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      
    # 2. CI環境（Ubuntu）に Ollama をインストールしてバックグラウンド起動
    - name: Install and Start Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        # バックグラウンドでサーバーを起動し、起動を少し待つ
        ollama serve &
        sleep 5
        # 必要なモデル（Gemma 3）をローカル環境にプル
        ollama pull gemma3:latest

    # 3. LLM コマンドラインツール（llm）とプラグインのセットアップ
    - name: Install LLM CLI & Plugins
      run: |
        pipx install llm
        llm install llm-ollama
        
    # 🔑 4. Google Cloud の認証を通す
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # 🛠 5. gcloud/gsutil のセットアップ
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # 📥 6. GCSバケットから最新データをCI環境に引き抜く
    - name: Download latest data from GCS
      run: |
        mkdir -p data logs
        gsutil cp gs://GCP_SA_KEY/processed_market_data.parquet data/ || echo "Parquet not found in GCS, using fallback."
        gsutil cp gs://GCP_SA_KEY/stocks.db ./ || echo "SQLite DB not found in GCS, creating new."

    # 7. パイプラインの実行（ビルド＆リリース実行）
    - name: Run AI Scout Pipeline
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        # 本番運用のため --release フラグで最適化ビルドして実行
        cargo run --release --bin ai_scout

    # 📤 8. Rustの処理が終わった後、google　Mydriveに保存する
    - name: Upload latest data to Google Drive
      if: success()
      env:
        # 3ヶ月前に登録されている認証情報をRustに環境変数として渡す
        GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        # マイドライブへアップロードするRustのバイナリを実行
        cargo run --release --bin upload_drive

    # 9. 生成された成果物（CSVやログ）の永続化
    - name: Upload execution artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ai-scout-results-${{ github.job }}
        path: |
          *.csv
          *.txt
        retention-days: 7

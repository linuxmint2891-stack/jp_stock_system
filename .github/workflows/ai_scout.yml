name: AI Scout Daily Automation

on:
  schedule:
    # 日本時間 朝 8:15 (UTC 前日 23:15) に実行 (月曜〜金曜 JST に対応するよう UTC 日曜〜木曜 0-4 に設定)
   #  - cron: '15 23 * * 0-4'
    # 日本時間 朝 8:15 (UTC 前日 23:15) に実行 (毎日実行するように曜日を '*' に変更)
    - cron: '15 23 * * *'
  workflow_dispatch: # 手動トリガー

env:
  CARGO_TERM_COLOR: always

jobs:
  scout_and_analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # 🔗 常に最新の特定のブランチ（master）を明示的に指定する
        ref: master
        # 🔄 ローカルのキャッシュを無視して、必ずリモートの最新を取得する
        fetch-depth: 1

    # 1. Rust 開発環境のセットアップとキャッシュによる高速化
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: swatinem/rust-cache@v2

    # 🔑 2. Google Cloud の認証を通す
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # 🛠 3. gcloud/gsutil のセットアップ
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # 4. パイプラインの実行（データ同期 & AI分析）
    - name: Run AI Scout Pipeline
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        GDRIVE_TOKEN_CACHE: ${{ secrets.GDRIVE_TOKEN_CACHE }}
        # 🔑 【重要】バイナリ側でパスとして解釈させるためファイル名を指定
        GDRIVE_SECRET_JSON: "client_secret.json"
        # 🔑 シークレットの本体
        RAW_SECRET_DATA: ${{ secrets.M_DRIVE_SECRET }}
      run: |
        # ① シークレットが空でないか確認
        if [ -z "$RAW_SECRET_DATA" ]; then
          echo "❌ Error: M_DRIVE_SECRET is not set in GitHub Secrets."
          echo "GitHubリポジトリの Settings > Secrets and variables > Actions で"
          echo "M_DRIVE_SECRET を設定してください。"
          exit 1
        fi

        # ② 本物の JSON 中身を client_secret.json として書き出す
        echo "$RAW_SECRET_DATA" > client_secret.json

        # 書き出したファイルが空でないか、JSONとして開始されているか簡易チェック
        if [[ $(head -c 1 client_secret.json) != "{" ]]; then
          echo "❌ Error: client_secret.json does not start with '{'. Secret might be invalid."
          exit 1
        fi

        mkdir -p data
        mkdir -p logs

        # ③ Googleドライブから最新の Parquet 台帳をダウンロード
        echo "📥 Downloading baseline data from Google Drive..."
        cargo run --release --bin download_drive

        # ④ 最新価格の超軽量同期 (デイリーモード)
        echo "🚀 Syncing latest market data..."
        cargo run --release --bin sync_yahoo

        # ⑤ AI分析実行
        echo "🧠 Running AI Scout analysis..."
        cargo run --release --bin ai_scout

        # 使い終わった認証ファイルを削除
        rm -f client_secret.json

    # 📤 5. 最新データをGoogle ドライブに保存・同期
    - name: Upload updated data back to Google Drive
      if: success()
      env:
        GDRIVE_TOKEN_CACHE: ${{ secrets.GDRIVE_TOKEN_CACHE }}
        GDRIVE_SECRET_JSON: "client_secret.json"
        RAW_SECRET_DATA: ${{ secrets.M_DRIVE_SECRET }}
      run: |
        if [ -n "$RAW_SECRET_DATA" ]; then
          echo "$RAW_SECRET_DATA" > client_secret.json

          # マイドライブへ最新のParquetファイルをアップロード（上書き）
          cargo run --release --bin upload_drive

          rm -f client_secret.json
        else
          echo "⚠️ Skipping upload because M_DRIVE_SECRET is not set."
        fi
    # 6. 生成された成果物（CSVやログ）の永続化
    - name: Upload execution artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ai-scout-results-${{ github.job }}
        path: |
          *.csv
          *.txt
        retention-days: 7

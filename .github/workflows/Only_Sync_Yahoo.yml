name: 🔄 Sync Yahoo Data Only

# 💡 これを書くことで、GitHubの画面に「Run workflow」ボタンが出現します
on:
  workflow_dispatch:

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          cache: true

      # もしGoogle Driveからのベースライン取得が必要な場合はこのステップを残します
      - name: 📥 Download baseline from Google Drive
        env:
          # 💡 左側（環境変数名）はシステムが求める「GDRIVE_SECRET_JSON」のまま、
          #    右側（シークレット名）を実際の「M_DRIVE_SECRET」に変更します。
          GDRIVE_SECRET_JSON: ${{ secrets.M_DRIVE_SECRET }}
        run: |
          cargo run --release --bin download_drive

      - name: 🚀 Run sync_yahoo only
        run: |
          cargo run --release --bin sync_yahoo

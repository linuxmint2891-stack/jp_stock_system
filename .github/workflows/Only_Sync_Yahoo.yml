name: 🔄 Sync Yahoo Data Only

# GitHubの画面に「Run workflow」ボタンを出現させます
on:
  workflow_dispatch:

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Rustのビルドキャッシュを高機能に管理（2回目以降の爆速化）
      - name: 💾 Rust Cache
        uses: swatinem/rust-cache@v2

      # 正しいシークレット名（M_DRIVE_SECRET）をシステム側の環境変数にマッピング
      - name: 📥 Download baseline from Google Drive
        env:
          GDRIVE_SECRET_JSON: ${{ secrets.M_DRIVE_SECRET }}
        run: |
          cargo run --release --bin download_drive

      # Yahooデータの同期実行
      - name: 🚀 Run sync_yahoo only
        run: |
          cargo run --release --bin sync_yahoo

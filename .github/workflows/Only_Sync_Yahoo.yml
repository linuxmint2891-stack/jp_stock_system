name: 🔄 Sync Yahoo Data Only

on:
  workflow_dispatch:

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 💾 Rust Cache
        uses: swatinem/rust-cache@v2

      # 1. まず現在のベースラインを落とす
      - name: 📥 Download baseline from Google Drive
        env:
          GDRIVE_SECRET_JSON: ${{ secrets.M_DRIVE_SECRET }}
        run: |
          cargo run --release --bin download_drive

      # 2. 修正した超軽量ロジックで差分同期 (数分で終わります)
      - name: 🚀 Run sync_yahoo only
        run: |
          cargo run --release --bin sync_yahoo

      # 3. 🔥【最重要】同期した最新データをDriveへ書き戻す
      - name: 📤 Upload updated data to Google Drive
        env:
          GDRIVE_SECRET_JSON: ${{ secrets.M_DRIVE_SECRET }}
        run: |
          cargo run --release --bin upload_drive
